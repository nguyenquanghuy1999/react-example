name: React Deployment

on: 
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy using ssh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |  
              cd /var/www/react-example/
              export NVM_DIR=~/.nvm
              source ~/.nvm/nvm.sh
              git pull origin main
              npm install
              npm run build
